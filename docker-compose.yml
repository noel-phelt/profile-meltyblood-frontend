version: '3.8'

services:
  app:
    build: .
    volumes:
      - ./src:/var/www:cached
      - node_modules:/var/www/node_modules
    working_dir: "/var/www"
    tty: true
    stdin_open: true
    command: yarn dev
    ports:
      - "3000:3000"
      - "24678:24678"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - API_DOMAIN="localhost:80"
      - STORAGE_URL=https://file.meltyblood-typelumina-fan.com
      - SITE_URL=https://profile.meltyblood-typelumina-fan.com
      - SITE_OGP_IMAGE=https://file.meltyblood-typelumina-fan.com/site_image/ogp.jpeg
    networks:
      - nuxt

volumes:
  node_modules:


networks:
  nuxt:
